<?xml version="1.0" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" 
"http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">

<svg width="30" height="35" version="1.1"
xmlns="http://www.w3.org/2000/svg">
<defs>
  <filter id="shadow" width="200%" height="200%" x="-20%" y="-20%">
    <feDropShadow dx="0" dy="0" stdDeviation="1" flood-color="white">
      <animate
        id="h"
        attributeName="dy"
        values="0;-5;0"
        begin="2s;h.end+2s;"
        dur="2s"
        />
    </feDropShadow>
  </filter>
</defs>
<!-- <rect width="100%" height="100%" fill="green" /> -->
<polyline
  points="15 7, 4 27.5, 26 27.5, 15 7"
  style="stroke-width:2px;stroke:white;fill:white;fill-opacity:0;filter:url(#shadow)"
/>
<polyline
  points="15 33, 4 12.5, 26 12.5, 15 33"
  style="stroke-width:2px;stroke:white;fill:white;fill-opacity:0;filter:url(#shadow)"
/>
<circle
  cx="15" cy="20" r="14" stroke="white" stroke-width="2" fill="none"
  style="filter:url(#shadow);"
/>
</svg>